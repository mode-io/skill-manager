name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - assets/**
  pull_request:
    paths-ignore:
      - README.md
      - CONTRIBUTING.md
      - SECURITY.md
      - LICENSE
      - assets/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt

      - name: Backend compatibility tests
        run: bash scripts/test_backend.sh

  frontend-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Check version sync
        run: ./.venv/bin/python scripts/sync_version.py --check

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

  package-smoke-arm64:
    runs-on: macos-14
    needs:
      - backend-compat
      - frontend-validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install build dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt .[build]
          npm ci

      - name: Build release artifact
        run: ./.venv/bin/python scripts/build_release.py

      - name: Validate packaged binary
        run: |
          VERSION="$(cat skill_manager/VERSION)"
          ARTIFACT="$(find .artifacts/release -name '*darwin-arm64.tar.gz' -print -quit)"
          ./.venv/bin/python scripts/validate_release_artifact.py --artifact "$ARTIFACT" --version "$VERSION"

      - name: Validate npm wrapper with local artifact
        run: |
          ARTIFACT="$(find .artifacts/release -name '*darwin-arm64.tar.gz' -print -quit)"
          bash scripts/validate_npm_wrapper.sh "$ARTIFACT"

      - name: Validate Homebrew formula install smoke
        run: |
          VERSION="$(cat skill_manager/VERSION)"
          ARTIFACT="$(find .artifacts/release -name '*darwin-arm64.tar.gz' -print -quit)"
          bash scripts/validate_homebrew_formula.sh "$VERSION" "$ARTIFACT"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: package-smoke-arm64
          path: .artifacts/release/*

  package-smoke-x64:
    runs-on: macos-15-intel
    needs:
      - backend-compat
      - frontend-validate
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install build dependencies
        run: |
          python -m venv .venv
          ./.venv/bin/python -m pip install --upgrade pip
          ./.venv/bin/python -m pip install -r requirements.txt .[build]
          npm ci

      - name: Build release artifact
        run: ./.venv/bin/python scripts/build_release.py

      - name: Validate packaged binary
        run: |
          VERSION="$(cat skill_manager/VERSION)"
          ARTIFACT="$(find .artifacts/release -name '*darwin-x64.tar.gz' -print -quit)"
          ./.venv/bin/python scripts/validate_release_artifact.py --artifact "$ARTIFACT" --version "$VERSION"

      - name: Validate npm wrapper with local artifact
        run: |
          ARTIFACT="$(find .artifacts/release -name '*darwin-x64.tar.gz' -print -quit)"
          bash scripts/validate_npm_wrapper.sh "$ARTIFACT"

      - name: Validate Homebrew formula install smoke
        run: |
          VERSION="$(cat skill_manager/VERSION)"
          ARTIFACT="$(find .artifacts/release -name '*darwin-x64.tar.gz' -print -quit)"
          bash scripts/validate_homebrew_formula.sh "$VERSION" "$ARTIFACT"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: package-smoke-x64
          path: .artifacts/release/*
