[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "skill-manager"
version = "0.1.0"
description = "Bootstrap read-only local app and test infrastructure for universal skill management."
requires-python = ">=3.11"

[tool.setuptools.packages.find]
include = ["skill_manager*"]
